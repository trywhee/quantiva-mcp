<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DataQuant Pro - MCP Configuration</title>
    <style>
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
            padding: 20px;
            margin: 0;
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            background: #1a1a1a;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid #333;
            font-size: 14px;
            line-height: 1.5;
            overflow-x: auto;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .status {
            color: #4ade80;
            font-size: 12px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status">✓ DataQuant Pro - MCP Server Configuration</div>
        <pre id="json">Loading configuration...</pre>
    </div>
    <script>
        // Fetch and display the MCP configuration
        fetch('/quantiva-mcp/.well-known/mcp.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                document.getElementById('json').textContent = JSON.stringify(data, null, 2);
            })
            .catch(error => {
                document.getElementById('json').innerHTML = `{
  "error": "Unable to load configuration",
  "message": "${error.message}",
  "note": "Please ensure .well-known/mcp.json exists"
}`;
            });
    </script>
</body>
</html>
